name: CI

on:
  push:
    branches: [master, 'fix/**']
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm type-check

      - name: Tests
        run: pnpm exec vitest run

      - name: Build
        run: pnpm build

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks (scan de secrets)
        uses: gitleaks/gitleaks-action@v2
        env:
          # gitleaks-action@v2 exige un GITHUB_TOKEN pour scanner les PR.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'false'

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
      # Pas de `cache: pnpm` ici : ce job n'exécute pas `pnpm install`, donc le
      # store pnpm n'existe pas au moment de la sauvegarde du cache → l'action
      # de cache échouait ("Path Validation Error"). `pnpm audit` lit le lockfile.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      # Audit non bloquant (informatif) : signale les vulnérabilités connues
      # sans casser le pipeline pour des avis transitoires.
      - name: Dependency audit (prod)
        run: pnpm audit --prod || true
